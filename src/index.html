<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>convocacao</title>
  <script src="supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body { font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    /* ===== Tela de login/cadastro ===== */
    body.v-cadastro {
      background: #0f1117; color: #fff;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    .caixa {
      background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 16px;
      padding: 36px; width: 300px; display: flex; flex-direction: column; gap: 16px;
    }
    .caixa h2 { font-size: 18px; text-align: center; }
    .caixa p { font-size: 13px; color: #888; text-align: center; }
    .caixa label { font-size: 12px; color: #888; margin-bottom: 4px; display: block; }
    .caixa input, .caixa select {
      background: #0f1117; border: 1px solid #2a2d3a; color: #fff;
      padding: 10px 14px; border-radius: 8px; font-size: 14px; width: 100%;
    }
    .caixa input:focus, .caixa select:focus { outline: none; border-color: #ff7a00; }
    .caixa button {
      background: #ff7a00; color: #1a1000; border: none; padding: 12px;
      border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .caixa button:hover { background: #ff8c1a; }
    .caixa button:disabled { opacity: .6; cursor: default; }
    .erro { color: #f87171; font-size: 12px; text-align: center; display: none; }

    /* ===== Tela de alerta (tela cheia) — INALTERADA ===== */
    body.v-alerta {
      background: #0a0a0a; color: #fff;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    body.v-alerta.flash { animation: flashBg 0.8s ease; }
    @keyframes flashBg {
      0% { background: #ff2200; } 30% { background: #0a0a0a; }
      60% { background: #ff2200; } 100% { background: #0a0a0a; }
    }
    .overlay {
      position: fixed; inset: 0; background: rgba(255,30,0,0.15);
      pointer-events: none; animation: pulseOverlay 1.5s infinite; display: none;
    }
    body.v-alerta .overlay { display: block; }
    @keyframes pulseOverlay { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    .alertaCaixa { text-align: center; padding: 40px; width: 100%; display: none; }
    body.v-alerta .alertaCaixa { display: block; }
    .alerta {
      font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 6px;
      color: #ff7a00; margin-bottom: 20px; animation: piscar 0.6s infinite;
    }
    @keyframes piscar { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    .quem { font-size: 22px; color: #aaa; margin-bottom: 10px; }
    .nomeGestor {
      font-size: 84px; font-weight: 800; line-height: 1.05; margin-bottom: 18px;
      text-shadow: 0 0 30px rgba(255,120,0,0.6);
    }
    .motivo { font-size: 28px; color: #ddd; margin-bottom: 40px; min-height: 1px; }
    .btnConfirmar {
      background: #18c964; color: #04140a; border: none; padding: 22px 60px;
      border-radius: 14px; font-size: 28px; font-weight: 800; cursor: pointer;
      box-shadow: 0 10px 40px rgba(24,201,100,0.4);
    }
    .btnConfirmar:hover { background: #14b257; }
    @keyframes shake {
      0%,100% { transform: translateX(0); } 15% { transform: translateX(-16px); }
      30% { transform: translateX(16px); } 45% { transform: translateX(-10px); }
      60% { transform: translateX(10px); } 75% { transform: translateX(-5px); }
      90% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.6s ease; }

    body.v-diagnostico {
      background: #10131a; color: #eef2f7; min-height: 100vh; overflow: auto;
      padding: 22px;
    }
    .diag-wrap { max-width: 720px; margin: 0 auto; }
    .diag-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .diag-head h1 { font-size: 20px; font-weight: 800; }
    .diag-actions { display: flex; gap: 8px; }
    .diag-actions button {
      border: 1px solid #313846; background: #171c25; color: #eef2f7;
      border-radius: 8px; padding: 9px 12px; font-weight: 700; cursor: pointer;
    }
    .diag-actions button.primary { background: #ff7a00; border-color: #ff7a00; color: #1a1000; }
    .diag-card {
      border: 1px solid #2b3342; background: #151a23; border-radius: 8px;
      padding: 14px; margin-bottom: 12px;
    }
    .diag-card strong { display: block; font-size: 13px; color: #9aa4b2; margin-bottom: 4px; }
    .diag-card span { display: block; font-size: 14px; overflow-wrap: anywhere; }
    .diag-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .diag-row.ok { border-color: rgba(24,201,100,.45); }
    .diag-row.warn { border-color: rgba(255,122,0,.55); }
    .diag-row.err { border-color: rgba(248,113,113,.55); }
    .diag-status { font-size: 13px; color: #9aa4b2; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ===== Conexão com o banco central (Conta Cosmo) =====
    const SUPABASE_URL  = 'https://eunkdomwdhhuppmpcken.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1bmtkb213ZGhodXBwbXBja2VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjk4ODgsImV4cCI6MjA5NzgwNTg4OH0.L1KBDrtlBdO4qRhsWaWcIdWa_VNXEDdg41RP6a3O4xo';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
    });

    // O "crachá" (token) renova a cada hora. Sem repassar o token novo pro canal
    // de tempo real, o websocket continua com o velho e o servidor derruba em
    // silêncio (~1-2h depois os chamados param de chegar). Este bloco corrige isso.
    db.auth.onAuthStateChange((_evento, sessao) => {
      try {
        if (sessao && sessao.access_token) db.realtime.setAuth(sessao.access_token);
      } catch (e) {}
    });

    const TAURI  = window.__TAURI__;
    const invoke = TAURI.core.invoke;
    const listen = TAURI.event.listen;
    const app    = document.getElementById('app');
    const STATUS_KEY = 'convocacao_status';

    function agora() { return new Date().toLocaleString('pt-BR'); }
    function erroTexto(e) { return (e && (e.message || e.error_description || e.toString())) || 'erro desconhecido'; }
    function html(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function lerStatusLocal() {
      try { return JSON.parse(localStorage.getItem(STATUS_KEY) || '{}'); } catch (e) { return {}; }
    }
    function salvarStatus(parcial) {
      try {
        const atual = lerStatusLocal();
        localStorage.setItem(STATUS_KEY, JSON.stringify(Object.assign(atual, parcial, { atualizado_em: agora() })));
      } catch (e) {}
    }

    // ---------------- LOGIN (Conta Cosmo) ----------------
    // modo 'cadastro' = 1ª vez (grava flag e reinicia já conectado)
    // modo 'oculta'   = PC migrado do sistema antigo (loga e conecta na hora)
    function viewLogin(modo) {
      document.body.className = 'v-cadastro';
      app.innerHTML = `
        <div class="caixa">
          <h2>Entrar</h2>
          <p>Use sua Conta Cosmo (login único).</p>
          <div>
            <label>E-mail</label>
            <input type="email" id="email" placeholder="nome@iguacu.adm.br" />
          </div>
          <div>
            <label>Senha</label>
            <input type="password" id="senha" placeholder="sua senha" />
          </div>
          <p class="erro" id="erro">E-mail ou senha inválidos.</p>
          <button id="btn">Entrar</button>
        </div>`;

      async function entrar() {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const erro  = document.getElementById('erro');
        erro.style.display = 'none';
        if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; erro.style.display = 'block'; return; }
        const btn = document.getElementById('btn');
        btn.disabled = true; btn.textContent = 'Entrando...';
        const { error } = await db.auth.signInWithPassword({ email, password: senha });
        btn.disabled = false; btn.textContent = 'Entrar';
        if (error) { erro.textContent = 'E-mail ou senha inválidos.'; erro.style.display = 'block'; return; }
        salvarStatus({ email_configurado: email, ultimo_login: agora(), ultimo_erro_login: '' });
        if (modo === 'cadastro') {
          // grava o "flag" de configurado → Rust reinicia e sobe a janela oculta já logada
          await invoke('salvar_config', { nome: email, setor: '' });
        } else {
          try { const w = TAURI.window.getCurrentWindow(); await w.hide(); } catch (e) {}
          conectarRealtime();
        }
      }
      document.getElementById('btn').addEventListener('click', entrar);
      document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
    }

    // ---------------- ALERTA (INALTERADO — o coração do sistema) ----------------
    function viewAlerta() {
      document.body.className = 'v-alerta';
      app.innerHTML = `
        <div class="overlay"></div>
        <div class="alertaCaixa" id="caixa">
          <div class="alerta">&#9888; ATENCAO &#9888;</div>
          <div class="quem">esta chamando voce</div>
          <div class="nomeGestor" id="nomeGestor">&mdash;</div>
          <div class="motivo" id="motivoTexto"></div>
          <button class="btnConfirmar" id="btnConfirmar">&#9989; CONFIRMAR</button>
        </div>`;

      let dados = null;
      let intervalo = null;

      function tocarSom() {
        try {
          const ctx = new AudioContext();
          [0, 0.3, 0.6].forEach(delay => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 1040;
            gain.gain.setValueAtTime(0.6, ctx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
            osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.3);
          });
        } catch (e) {}
      }
      function sacudir() {
        const c = document.getElementById('caixa');
        c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');
      }
      function flash() {
        document.body.classList.remove('flash'); void document.body.offsetWidth;
        document.body.classList.add('flash');
      }

      function iniciar(d) {
        dados = d;
        document.getElementById('nomeGestor').textContent = d.origem || '—';
        document.getElementById('motivoTexto').textContent = d.motivo || '';
        flash(); tocarSom(); sacudir();
        if (intervalo) clearInterval(intervalo);
        intervalo = setInterval(() => { tocarSom(); sacudir(); }, 4000);
      }
      function parar() { if (intervalo) { clearInterval(intervalo); intervalo = null; } }

      document.getElementById('btnConfirmar').addEventListener('click', () => {
        if (!dados) return;
        const id = dados.id; dados = null; parar();
        invoke('confirmar', { id: id });
      });

      invoke('pegar_dados_alerta').then(d => { if (d) iniciar(d); });
      listen('disparar-alerta', e => iniciar(e.payload));
      listen('parar-alerta', () => parar());
    }

    // ---------------- OCULTA (conexão via Supabase Realtime) ----------------
    let mostrando = false;
    let realtimeConectado = false;
    let pendentesTimer = null;
    let canalAtual = null;
    let reconexaoTimer = null;
    let reconexaoTentativas = 0;

    // Assina o canal de tempo real e — o que faltava — RECONECTA sozinho quando
    // ele cai (erro, timeout, fechado), com espera crescente (2s, 4s, 8s... máx 30s).
    function assinarCanal(fid) {
      if (canalAtual) { try { db.removeChannel(canalAtual); } catch (e) {} }
      const cfg = { event: 'INSERT', schema: 'convocacao', table: 'chamadas' };
      if (fid) cfg.filter = 'funcionario_id=eq.' + fid;
      const canal = db.channel('minhas-convocacoes-' + Date.now())
        .on('postgres_changes', cfg, () => processarPendentes());
      canalAtual = canal;
      canal.subscribe(status => {
        if (canal !== canalAtual) return; // canal antigo descartado: ignora
        salvarStatus({ realtime: status });
        if (status === 'SUBSCRIBED') {
          reconexaoTentativas = 0;
          processarPendentes(); // pega o que chegou enquanto estava desconectado
          return;
        }
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
          if (reconexaoTimer) clearTimeout(reconexaoTimer);
          const espera = Math.min(30000, 2000 * Math.pow(2, reconexaoTentativas++));
          salvarStatus({ realtime: status + ' (reconectando em ' + Math.round(espera / 1000) + 's)' });
          reconexaoTimer = setTimeout(() => assinarCanal(fid), espera);
        }
      });
    }

    // Mostra a chamada pendente mais antiga (uma de cada vez). O Rust cuida da
    // janela tela cheia em todos os monitores + som + piscar; aqui só disparamos.
    async function processarPendentes() {
      if (mostrando) return;
      salvarStatus({ ultima_busca_pendentes: agora() });
      let pend = [];
      try {
        const r = await db.rpc('minhas_chamadas_pendentes');
        if (r.error) throw r.error;
        pend = r.data || [];
        salvarStatus({ pendentes: pend.length, ultimo_erro_pendentes: '' });
      } catch (e) {
        salvarStatus({ ultimo_erro_pendentes: erroTexto(e) });
        return;
      }
      if (!pend.length) return;
      const c = pend[0]; // ordenadas por criada_em asc → a mais antiga primeiro (FIFO)
      mostrando = true;
      salvarStatus({ ultima_chamada_recebida: agora(), ultima_chamada_id: String(c.id || '') });
      try {
        await invoke('mostrar_alerta', { id: String(c.id), origem: c.convocado_por_nome || '', motivo: c.motivo || '' });
        salvarStatus({ ultimo_erro_alerta: '' });
      } catch (e) {
        mostrando = false;
        salvarStatus({ ultimo_erro_alerta: erroTexto(e) });
      }
    }

    async function conectarRealtime() {
      if (realtimeConectado) { processarPendentes(); return; }
      realtimeConectado = true;
      let fid = null;
      try {
        const r = await db.rpc('meu_funcionario_id');
        if (r.error) throw r.error;
        fid = r.data || null;
        salvarStatus({ funcionario_id: fid || '', ultimo_erro_funcionario: '' });
      } catch (e) {
        salvarStatus({ funcionario_id: '', ultimo_erro_funcionario: erroTexto(e) });
      }

      assinarCanal(fid);

      // Confirmação vinda da janela de alerta (o Rust repassa este evento pra cá).
      // Se falhar (ex.: token acabou de virar), tenta de novo em 3s — senão a
      // chamada fica pendente no banco e o alerta reapareceria.
      listen('confirmar-chamada', async (e) => {
        mostrando = false;
        const idChamada = e.payload.id;
        try {
          const r = await db.rpc('confirmar_chamada', { p_chamada_id: idChamada });
          if (r.error) throw r.error;
          salvarStatus({ ultimo_erro_confirmacao: '' });
        } catch (err) {
          salvarStatus({ ultimo_erro_confirmacao: erroTexto(err) });
          setTimeout(async () => {
            try { await db.rpc('confirmar_chamada', { p_chamada_id: idChamada }); } catch (e2) {}
          }, 3000);
        }
        salvarStatus({ ultima_confirmacao: agora(), ultima_chamada_id: idChamada || '' });
        setTimeout(processarPendentes, 300);
      });

      // Batimento vindo do lado nativo (Rust): acorda o app a cada 20s pra buscar
      // pendências mesmo quando o sistema congela os timers do JS (App Nap do macOS).
      listen('verificar-pendentes', () => processarPendentes());

      // Chamados perdidos enquanto o PC estava desligado.
      processarPendentes();
      if (!pendentesTimer) pendentesTimer = setInterval(processarPendentes, 15000);
    }

    async function viewOculta() {
      document.body.style.background = 'transparent';
      let sessao = null;
      try { const r = await db.auth.getSession(); sessao = r.data.session; } catch (e) {}
      if (!sessao) {
        salvarStatus({ sessao: 'sem sessao', email_sessao: '', realtime: 'nao iniciado' });
        // PC ainda sem sessão (ex.: veio do sistema antigo): pede login e conecta.
        try { const w = TAURI.window.getCurrentWindow(); await w.show(); await w.setFocus(); } catch (e) {}
        viewLogin('oculta');
        return;
      }
      salvarStatus({ sessao: 'ativa', email_sessao: (sessao.user && sessao.user.email) || '' });
      conectarRealtime();
    }

    // ---------------- DIAGNOSTICO ----------------
    function viewDiagnostico() {
      document.body.className = 'v-diagnostico';
      app.innerHTML = `
        <div class="diag-wrap">
          <div class="diag-head">
            <h1>Diagnostico Convocacao</h1>
            <div class="diag-actions">
              <button type="button" class="primary" id="diagAtualizar">Atualizar</button>
              <button type="button" id="diagFechar">Fechar</button>
            </div>
          </div>
          <p class="diag-status" id="diagStatus">Verificando...</p>
          <div class="diag-grid" id="diagLista"></div>
        </div>`;

      document.getElementById('diagAtualizar').addEventListener('click', executarDiagnostico);
      document.getElementById('diagFechar').addEventListener('click', async () => {
        try { await TAURI.window.getCurrentWindow().close(); } catch (e) {}
      });
      executarDiagnostico();
    }

    function diagLinha(titulo, valor, tipo) {
      return '<div class="diag-card diag-row ' + (tipo || '') + '"><strong>' + html(titulo) + '</strong><span>' + html(valor || '—') + '</span></div>';
    }

    async function testarRealtimeDiag(fid) {
      return new Promise(resolve => {
        const cfg = { event: 'INSERT', schema: 'convocacao', table: 'chamadas' };
        if (fid) cfg.filter = 'funcionario_id=eq.' + fid;
        const canal = db.channel('diag-convocacao-' + Date.now()).on('postgres_changes', cfg, () => {});
        let finalizado = false;
        const terminar = status => {
          if (finalizado) return;
          finalizado = true;
          try { db.removeChannel(canal); } catch (e) {}
          resolve(status);
        };
        const timer = setTimeout(() => terminar('sem resposta em 5s'), 5000);
        canal.subscribe(status => {
          if (status === 'SUBSCRIBED' || status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
            clearTimeout(timer);
            terminar(status);
          }
        });
      });
    }

    async function executarDiagnostico() {
      const lista = document.getElementById('diagLista');
      const status = document.getElementById('diagStatus');
      status.textContent = 'Verificando...';
      lista.innerHTML = '';
      const linhas = [];
      const local = lerStatusLocal();

      let cfgLocal = null;
      try { cfgLocal = await invoke('ler_config'); } catch (e) {}
      linhas.push(diagLinha('Configuracao local', cfgLocal && cfgLocal.nome ? cfgLocal.nome : 'nao encontrada', cfgLocal && cfgLocal.nome ? 'ok' : 'warn'));

      let sessao = null;
      try {
        const r = await db.auth.getSession();
        sessao = r.data.session;
        linhas.push(diagLinha('Sessao Supabase', sessao ? ((sessao.user && sessao.user.email) || 'ativa') : 'sem sessao', sessao ? 'ok' : 'err'));
      } catch (e) {
        linhas.push(diagLinha('Sessao Supabase', erroTexto(e), 'err'));
      }

      let fid = null;
      try {
        const r = await db.rpc('meu_funcionario_id');
        if (r.error) throw r.error;
        fid = r.data || null;
        linhas.push(diagLinha('Funcionario encontrado', fid ? fid : 'nao encontrado', fid ? 'ok' : 'err'));
      } catch (e) {
        linhas.push(diagLinha('Funcionario encontrado', erroTexto(e), 'err'));
      }

      try {
        const r = await db.rpc('minhas_chamadas_pendentes');
        if (r.error) throw r.error;
        const pend = r.data || [];
        linhas.push(diagLinha('Chamadas pendentes', String(pend.length), pend.length ? 'warn' : 'ok'));
        if (pend[0]) linhas.push(diagLinha('Primeira pendente', 'id ' + pend[0].id + ' / ' + (pend[0].convocado_por_nome || 'sem origem'), 'warn'));
      } catch (e) {
        linhas.push(diagLinha('Chamadas pendentes', erroTexto(e), 'err'));
      }

      const rt = await testarRealtimeDiag(fid);
      linhas.push(diagLinha('Realtime Supabase', rt, rt === 'SUBSCRIBED' ? 'ok' : 'err'));

      linhas.push(diagLinha('Ultimo status salvo', JSON.stringify(local), ''));
      lista.innerHTML = linhas.join('');
      status.textContent = 'Atualizado em ' + agora();
    }

    // ---------------- Roteamento ----------------
    (async () => {
      let view = 'oculta';
      try { view = await invoke('qual_view'); } catch (e) {}
      if (view === 'cadastro') viewLogin('cadastro');
      else if (view === 'alerta') viewAlerta();
      else if (view === 'diagnostico') viewDiagnostico();
      else viewOculta();
    })();
  </script>
</body>
</html>
